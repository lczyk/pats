sandboxes:
  # a container sandbox names its image one of two ways (exactly one):
  #   image: <ref>   -- use an existing image as-is
  #   build: <path>  -- a docker build context pats builds at run start: a dir
  #                     (with a Dockerfile) or a Dockerfile path, relative to
  #                     this file. the layer cache makes no-change rebuilds
  #                     cheap. if the context contains .pats/ (run artifacts)
  #                     and the dockerfile COPYs/ADDs from the context, the
  #                     effective .dockerignore must exclude it (a literal
  #                     `.pats/` line) or the run refuses to start.
  - id: docker
    kind: container
    driver: docker
    image: ghcr.io/lczyk/pats/sandbox:26.04
    # egress -- outbound network policy (omit for open network). modes:
    #   open       -- unrestricted (the default)
    #   none       -- no network at all (--network none)
    #   proxy      -- filtering sidecar: allow/deny by host + a per-pair audit
    #                 log. the hosts the harness itself needs (inference api,
    #                 token refresh) are merged into the allowlist for you.
    #   mitm-proxy -- proxy, plus url-level rules: hosts named in deny-urls get
    #                 their tls terminated with a per-run CA (the sandbox is
    #                 given the CA to trust) so requests are filtered by full
    #                 url; other hosts stay undecrypted tunnels. patterns are
    #                 host-anchored, `*` matches anything (`/` included).
    # egress:
    #   mode: mitm-proxy
    #   default: deny
    #   allow:
    #     - .ubuntu.com   # apt mirrors
    #     - github.com
    #   deny-urls:
    #     - "github.com/*/some-answer-repo*"
    #   # inverse: a host with allow-urls only passes matching urls (deny wins)
    #   # allow-urls:
    #   #   - "github.com/some-org/*"
  # bwrap (linux-only, no image) is planned but not implemented yet -- a bwrap
  # sandbox is rejected at validation.
  # - id: bwrap
  #   kind: bwrap

# agents -- the harnesses (agent clis) under test, run in a sandbox. four kinds:
#   opencode-openrouter -- the opencode cli, models served via openrouter.
#                          reads OPENROUTER_API_KEY from the env. the model is
#                          written without the openrouter/ prefix (added for you).
#   claude-cli-keyless  -- the claude cli, keyless: oauth creds
#                          (~/.claude/.credentials.json) are copied into the
#                          sandbox. the model is a raw anthropic id.
#   codex-cli-keyless   -- the codex cli, keyless: chatgpt login creds
#                          (~/.codex/auth.json) are copied into an isolated
#                          CODEX_HOME. the model is a raw openai id. a login
#                          held in the os keyring has no file to copy -- switch
#                          codex to file credential storage first.
#   copilot-cli-keyless -- the copilot cli, keyless: a github token read from
#                          COPILOT_GITHUB_TOKEN in the env (mint one with
#                          `security find-generic-password -s copilot-cli -w`
#                          on macos, or `gh auth token`). the model is a
#                          copilot model id (e.g. claude-sonnet-4.5, gpt-5).
# an agent not named in any suite is never run as a task -- it can still
# act as a `kind: agent` scorer (see `judge` below).
agents:
  # the model under test: claude-haiku, run through the claude cli.
  - id: haiku-claude-cli
    kind: claude-cli-keyless
    sandbox: docker
    model: claude-haiku-4-5-20251001

  # the same model under a different harness -- isolates harness effect from
  # model effect (the comparison BYOH unlocks).
  - id: haiku-opencode
    kind: opencode-openrouter
    sandbox: docker
    model: anthropic/claude-haiku-4.5

  # a codex agent slots into a suite the same way. commented out here because
  # it isn't the same underlying model as the haiku pair above, so it would
  # measure model effect rather than harness effect.
  # - id: codex
  #   kind: codex-cli-keyless
  #   sandbox: docker
  #   model: <codex-model-id>
  #   effort: high

  # a copilot agent, same caveat as the codex one above.
  # - id: copilot
  #   kind: copilot-cli-keyless
  #   sandbox: docker
  #   model: <copilot-model-id>
  #   effort: high

  # the scorer agent: a stronger model (sonnet) to judge the weaker one (haiku).
  # not in any suite -> only ever runs as a `kind: agent` scorer. commented out
  # with its scorer (`no-colloquialisms` below) until agent scorers are
  # implemented -- an agent in no suite and no scorer is an orphan error.
  # - id: judge
  #   kind: claude-cli-keyless
  #   sandbox: docker
  #   model: claude-sonnet-4-6

# tasks -- a scenario handed to a harness agent. these test readme-authorship.
# prepare/collect/prompt run a file directly (no shell): the value is tokenised
# (posix quoting, no $-expansion or globbing) and argv[0] is exec'd with the rest
# as args. they get PATS_*_ID + PATS_WORKDIR/OUTPUT_DIR in env, and ${id} -> the
# task id.
#   prompt  -- the instruction the agent acts on: an executable file (its stdout
#              is the prompt), a plain file (its contents), or literal text.
#   prepare -- seed the sandbox before the agent runs (ground truth, fixtures).
#   collect -- gather the outputs to score after the agent finishes.
#   timeout -- per-pair wall-clock limit (e.g. 15m); default 10m, "0" = never.
tasks:
  - id: write-readme-simple
    prompt: prompts/write-readme-simple.txt
    prepare: scripts/prepare.sh --simple
    collect: scripts/collect.sh --simple
  - id: write-readme-hard
    prompt: prompts/write-readme-hard.txt
    prepare: scripts/prepare.sh --hard
    collect: scripts/collect.sh --hard
  - id: write-readme-monorepo
    prompt: prompts/write-readme-monorepo.txt
    prepare: scripts/prepare.sh --monorepo
    collect: scripts/collect.sh --monorepo

# scorers -- score one aspect of a task's collected output, 0.0 - 1.0.
# pats stays dumb here: it hands the collected files to the scorer; the user
# writes the scorer. two kinds:
#   (default) -- exec a file directly. the shebang picks the interpreter + deps
#                (e.g. `#!/usr/bin/env -S uv run --script` with inline deps).
#                exit 0 + first stdout line = float [0,1] or `na` (skip); a
#                non-zero exit = failure. the file must be executable (chmod +x).
#   agent     -- ask an agent to score (nondeterministic). NOT IMPLEMENTED YET.
# each file scorer names its own `score:` script; ${id} -> the scorer's id, so a
# uniform layout reads `score: scorers/${id}.sh`.
scorers:
  # imperative: deduct 0.1 per excessive-whitespace occurrence.
  - id: only-ascii
    score: scorers/${id}.sh

  # imperative + close to binary: 1.0 if the title is right, else 0.0.
  - id: title-correct
    score: scorers/${id}.sh

  # fuzzy: a script that trampolines to python + spacy (NLP) via its shebang.
  - id: no-finite-verbs
    score: scorers/${id}.sh

  # fuzzy + agentic: ask the judge agent to score. nondeterministic; only runs
  # under `pats score --agentic`. NOTE: agent scorers aren't implemented yet --
  # configuring one is rejected at validation, hence commented out.
  # - id: no-colloquialisms
  #   kind: agent
  #   agent-id: judge
  #   prompt: prompts/no-colloquialisms.txt

# suites -- named (agents, tasks, scorers) groups. both cross-products are
# implied within a suite: run = agents x tasks, score = tasks x scorers. every
# id is explicit -- no wildcards; reuse a list across suites with a yaml anchor
# (`agents: &all [...]` / `agents: *all`). each axis takes a scalar or a list;
# scorers may be empty (a run-only suite). every agent/task/scorer must appear
# in at least one suite (agents referenced by a `kind: agent` scorer are
# exempt) -- an orphaned entry is a validation error, so forgetting to wire a
# new task or scorer in fails at load instead of silently never running.
# a task's score is the mean over the scorers run on it. narrow a run or score
# to one suite with `-s <id>`.
suites:
  - id: readme
    agents: [haiku-claude-cli, haiku-opencode]
    tasks: [write-readme-simple, write-readme-hard, write-readme-monorepo]
    scorers: [only-ascii, title-correct, no-finite-verbs]
    # scorers: [..., no-colloquialisms]  # once agent scorers are implemented
