name: lint_and_test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26'

    - name: Install bubblewrap
      # for the bwrap sandbox e2e tests (skipped when bwrap is absent). the
      # sysctl lifts ubuntu 24.04's apparmor restriction on unprivileged user
      # namespaces, which the bwrap netns helper needs.
      run: |
        sudo apt-get install -y bubblewrap
        sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

    - name: Build
      run: make build

    - name: Lint
      run: make lint

    - name: Test
      run: make test
